<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Stuff Shop</title>

    <style>
    body{
        background-color: white;
        font-family: Arial, Helvetica, sans-serif;
    }

    .container{
        width: 760px;
        height: 400px;
        background-color: black;
        margin: 40px auto;
        display: flex;
        padding: 28px 22px;
        box-sizing: border-box;
    }

    /* LEFT MENU */

    .menu{
        width: 230px;
    }

    .menu a{
        display: block;
        background-color: red;
        color: white;
        text-decoration: none;
        font-weight: bold;
        border: 3px solid yellow;
        padding: 4px 6px;
        margin-bottom: 14px;
        font-size: 12px;
    }

    /* MÀU CHỮ CÁI ĐẦU */

    .black{
        color: black;
    }

    .blue{
        color: blue;
    }

    .darkgreen{
        color: darkgreen;
    }

    .green{
        color: lime;
    }

    .white{
        color: white;
    }

    .cyan{
        color: cyan;
    }

    .gray{
        color: gray;
    }

    .darkblue{
        color: darkblue;
    }

    /* RIGHT CONTENT */

    .content{
        flex: 1;
        text-align: center;
        color: white;
        padding-top: 20px;
    }

    .content h1{
        font-size: 42px;
        line-height: 34px;
        margin-bottom: 25px;
        font-family: Arial Black;
    }

    .content p{
        color: lightgray;
        font-size: 11px;
        line-height: 18px;
        margin: 8px 0;
    }

    /* IMAGES */

    .images{
        margin-top: 20px;
    }

    .images img{
        width: 58px;
        height: 48px;
        margin: 4px;
        background-color: white;
        padding: 2px;
    }

</style>
</head>
<body>
    <div class="container">

    <!-- LEFT MENU -->

    <div class="menu">

        <a href="#">
            <span class="black">A</span>ntiques
        </a>

        <a href="#">
            <span class="blue">B</span>ooks
        </a>

        <a href="#">
            <span class="darkgreen">C</span>lothes
        </a>

        <a href="#">
            <span class="green">E</span>lectronics
        </a>

        <a href="#">
            <span class="white">F</span>urniture
        </a>

        <a href="#">
            <span class="cyan">J</span>ewelry
        </a>

        <a href="#">
            <span class="gray">M</span>usic and Videos
        </a>

        <a href="#">
            <span class="darkblue">S</span>porting Goods
        </a>

    </div>

    <!-- RIGHT CONTENT -->

    <div class="content">

        <h1>
            THE <br>
            STUFF <br>
            SHOP
        </h1>

        <p>
            The Stuff Shop is your online home for the buying,
            selling, and trading of used merchandise and unique collectibles.
        </p>

        <p>
            Click a link on the left to browse the store.
        </p>

        <div class="images">

            <img src="hinh/bike.jpg">

            <img src="hinh/pc.jpg">

            <img src="hinh/gloves.jpg">

        </div>

    </div>

</div>
</body>
</html>
