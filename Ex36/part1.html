<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bài 36: Box Menu</title>
    <style type="text/css">
        .menu-box {
            width: 250px;
            margin: 20px;
            font-style: Arial, sans-serif;
        }

        h3 {
            height: 50px;
            width: 100%;
            /* Hình ảnh chữ "Choose a worry" */
            background: url("hinh/h3.png") no-repeat 0 100%;
            margin: 0;
            padding: 0;
        }

        ul {
            margin: 0;
            padding: 10px 10px 25px 45px;
            background: url("hinh/ul.png") no-repeat 0 100%;
            /* Hình icon viên thuốc/vòng tròn trước mỗi li */
            list-style-image: url("hinh/li.png");
        }

        /* Định dạng khoảng cách giữa các mục menu */
        li {
            margin-bottom: 5px;
        }

        /* unvisited link - liên kết chưa nhấn */
        a:link {
            color: red;
            text-decoration: underline;
        }

        /* visited link - liên kết đã nhấn */
        a:visited {
            color: #126da6; ;
            text-decoration: underline;
        }

        /* mouse over link - khi rê chuột vào */
        a:hover {
            color: red;
            padding-left: 10px;
            text-decoration: underline;
        }

        /* selected link - khi đang nhấn giữ chuột */
        a:active {
            color: blue;
        }
    </style>
</head>
<body>

    <div class="menu-box">
        <h3></h3> <ul>
            <li><a href="#">Future</a></li>
            <li><a href="#">Health</a></li>
            <li><a href="#">Life</a></li>
            <li><a href="#">Money</a></li>
            <li><a href="#">Personal</a></li>
            <li><a href="#">Phobias</a></li>
        </ul>
    </div>

</body>
</html>
