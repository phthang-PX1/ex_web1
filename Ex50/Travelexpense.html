<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Expense Report</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Times New Roman', Times, serif;
        }

        body {
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .browser-container {
            border: 3px solid #6350d2;
            width: 750px;
            background-color: #c4f3f3;
            padding: 10px 15px;
        }

        .header-logo {
            text-align: center;
            margin-bottom: 20px;
        }

        .header-logo img {
            max-width: 100%;
            height: auto;
            border: 2px solid #5c3d24;
        }

        h2 {
            font-family: "Times New Roman", Times, serif;
            font-size: 24px;
            margin: 10px 0 5px 0;
            color: #000;
        }

        hr {
            border: none;
            border-top: 2px solid #5c3d24;
            margin-bottom: 20px;
        }

        
        .form-group {
            margin-bottom: 15px;
            font-size: 14px;
        }

        .inline-group {
            display: inline-block;
            margin-right: 15px;
        }

        input[type="text"], input[type="date"], select, textarea {
            padding: 2px 5px;
            border: 1px solid #7a9cd3;
            background-color: #ffffff;
            font-size: 14px;
        }

        textarea {
            width: 100%;
            max-width: 500px;
            height: 80px;
            margin-top: 8px;
            resize: none;
        }

    
        table {
            width: 100%;
            border-collapse: separate;
            margin-top: 8px;
            background-color: #c4f3f3;
            border: 3px solid #c4f3f3;
        }

        th, td {
            border: 2px solid #4a9090;
            padding: 4px;
            text-align: center;
            font-size: 13px;
        }

        th {
            font-weight: bold;
            background-color: transparent;
        }


        table input, table select {
            width: 100%;
            border: 1px solid #7a9cd3;
        }

        .text-left {
            text-align: left;
        }

        .btn-container {
            margin: 20px 0;
        }

        button {
            padding: 3px 10px;
            background-color: #f0f0f0;
            border: 1px solid #767676;
            border-radius: 2px;
            cursor: pointer;
            font-size: 13px;
            margin-right: 5px;
        }

        button:hover {
            background-color: #e0e0e0;
        }

        .footer-text {
            font-size: 13px;
            margin-top: 15px;
            color: #000;
        }
    </style>
</head>
<body>

<div class="browser-container">
    <div class="header-logo">
        <img src="DeLong.jpg" alt="DeLong Enterprises">
    </div>

    <h2>Travel Expense Report</h2>
    <hr>

    <form id="expenseForm" onsubmit="handleSubmit(event)">
        <div class="form-group">
            <span class="inline-group">1) First Name: <input type="text" id="firstName" size="15" required></span>
            <span class="inline-group">Last Name: <input type="text" id="lastName" size="18" required></span>
        </div>

        <div class="form-group">
            2) Social Security Number: <input type="text" id="ssn" size="10" required>
        </div>

        <div class="form-group">
            3) Department: 
            <select id="department">
                <option value="Accounting">Accounting</option>
                <option value="Sales">Sales</option>
                <option value="HR">HR</option>
                <option value="IT">IT</option>
            </select>
        </div>

        <div class="form-group">
            4) Describe the purpose of your trip.
            <br>
            <textarea id="purpose" required></textarea>
        </div>

        <div class="form-group">
            5) Itemize your travel expenses
            <table>
                <thead>
                    <tr>
                        <th style="width: 15%;">Date</th>
                        <th style="width: 45%;">Description</th>
                        <th style="width: 25%;">Category</th>
                        <th style="width: 15%;">Amount</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><input type="text" placeholder="mm/dd/yy"></td>
                        <td><input type="text"></td>
                        <td>
                            <select>
                                <option value="Meal">Meal</option>
                                <option value="Hotel">Hotel</option>
                                <option value="Transport">Transport</option>
                            </select>
                        </td>
                        <td><input type="text"></td>
                    </tr>
                    <tr>
                        <td><input type="text" placeholder="mm/dd/yy"></td>
                        <td><input type="text"></td>
                        <td>
                            <select>
                                <option value="Meal">Meal</option>
                                <option value="Hotel">Hotel</option>
                                <option value="Transport">Transport</option>
                            </select>
                        </td>
                        <td><input type="text"></td>
                    </tr>
                    <tr>
                        <td><input type="text" placeholder="mm/dd/yy"></td>
                        <td><input type="text"></td>
                        <td>
                            <select>
                                <option value="Meal">Meal</option>
                                <option value="Hotel">Hotel</option>
                                <option value="Transport">Transport</option>
                            </select>
                        </td>
                        <td><input type="text"></td>
                    </tr>
                    <tr>
                        <td><input type="text" placeholder="mm/dd/yy"></td>
                        <td><input type="text"></td>
                        <td>
                            <select>
                                <option value="Meal">Meal</option>
                                <option value="Hotel">Hotel</option>
                                <option value="Transport">Transport</option>
                            </select>
                        </td>
                        <td><input type="text"></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="form-group">
            6) Have you submitted your receipts? 
            <input type="radio" id="receiptYes" name="receipts" value="Yes"> <label for="receiptYes">Yes</label>
            <input type="radio" id="receiptNo" name="receipts" value="No"> <label for="receiptNo"></label>
        </div>

        <div class="btn-container">
            <button type="submit">Submit travel expenses</button>
            <button type="reset">Reset</button>
        </div>
    </form>

    <div class="footer-text">
        Questions? Contact Debbie Larson in Accounting (ext. 2150).
    </div>
</div>

<script>
  
    function handleSubmit(event) {
        event.preventDefault(); // Ngăn trang reload lại
        alert("Thông báo: Form travel expenses của bạn đã được submit thành công!");
    }
</script>

</body>
</html>
