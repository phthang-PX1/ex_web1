<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Sản Phẩm - GET</title>
</head>
<body>

    <form action="trang_xu_ly.html" method="GET">
        
        <table width="650" border="0" cellpadding="8" cellspacing="0" align="center">
            <tr>
                <th>Part Number</th>
                <th>Description</th>
                <th>Price</th>
                <th>Qty</th>
                <th>Item table</th>
            </tr>
            
            <tr align="center">
                <td>C112</td>
                <td>Chuột Quang</td>
                <td>19.95$</td>
                <td><input type="text" name="qty_c112" size="15"></td>
                <td><input type="text" name="item_c112" size="20"></td>
            </tr>
            
            <tr align="center">
                <td>B124</td>
                <td>Bàn Phím</td>
                <td>29.95$</td>
                <td><input type="text" name="qty_b124" size="15"></td>
                <td><input type="text" name="item_b124" size="20"></td>
            </tr>
            
            <tr align="center">
                <td>U125</td>
                <td>USB KingMax</td>
                <td>39.95$</td>
                <td><input type="text" name="qty_u125" size="15"></td>
                <td><input type="text" name="item_u125" size="20"></td>
            </tr>
            
            <tr>
                <td colspan="5"><hr></td>
            </tr>
            
            <tr>
                <td colspan="4" align="right">Total</td>
                <td align="center"><input type="text" name="total_amount" size="20"></td>
            </tr>
            
            <tr>
                <td colspan="5" align="right">
                    <button type="submit">TongCong</button>
                </td>
            </tr>
        </table>

    </form>

</body>
</html>
