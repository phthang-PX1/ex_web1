<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý đơn hàng</title>
    <link rel="stylesheet" href="mainstyle.css">
</head>
<body>

    <div class="table-wrapper">
        <table id="cartTable">
            <thead>
                <tr>
                    <th>Mã sản phẩm</th>
                    <th>Tên Sản phẩm</th>
                    <th>Giá</th>
                    <th>Số lượng</th>
                    <th>Thành tiền</th>
                </tr>
            </thead>
            <tbody>
                <tr class="product-row">
                    <td>C112</td>
                    <td>Chuột Quang</td>
                    <td class="price" data-value="10">10$</td>
                    <td>
                        <input type="number" class="quantity" value="2" min="0" oninput="tinhThanhTienDong(this)">
                    </td>
                    <td>
                        <input type="text" class="subtotal" value="20$" readonly>
                    </td>
                </tr>
                <tr class="product-row">
                    <td>B124</td>
                    <td>Bàn Phím</td>
                    <td class="price" data-value="20">20$</td>
                    <td>
                        <input type="number" class="quantity" value="3" min="0" oninput="tinhThanhTienDong(this)">
                    </td>
                    <td>
                        <input type="text" class="subtotal" value="60$" readonly>
                    </td>
                </tr>
                <tr class="product-row">
                    <td>U125</td>
                    <td>USB KingMax</td>
                    <td class="price" data-value="15">15$</td>
                    <td>
                        <input type="number" class="quantity" value="1" min="0" oninput="tinhThanhTienDong(this)">
                    </td>
                    <td>
                        <input type="text" class="subtotal" value="15$" readonly>
                    </td>
                </tr>
                
                <tr>
                    <td colspan="5"><hr></td>
                </tr>

                <tr>
                    <td colspan="4" class="text-right">Total</td>
                    <td>
                        <input type="text" id="totalPrice" value="95$" readonly>
                    </td>
                </tr>
                <tr>
                    <td colspan="5" class="text-right no-border">
                        <button onclick="tinhTongCong()">TongCong</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <script src="scripts.js"></script>
</body>
</html>
