<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Xử Lý Chuỗi</title>
<link rel="stylesheet" href="XLC_style.css">
</head>
<body>
 
<table class="main">
  <tr>
    <td>
      <h2>Sử dụng các hàm Xử Lý Chuỗi</h2>
 
      <div class="fieldset-row">
        <fieldset>
          <legend>Nhập dữ liệu</legend>
          <textarea id="txtInput"></textarea>
        </fieldset>
        <fieldset>
          <legend>Kết quả</legend>
          <textarea id="txtOutput" readonly></textarea>
        </fieldset>
      </div>
 
      <table class="btns">
        <tr>
          <td><button onclick="nhapDuLieu()">Nhập dữ liệu</button></td>
          <td><button onclick="denKyTuHoa()">Đến ký tự hoa</button></td>
        </tr>
        <tr>
          <td><button onclick="inChuHoa()">In chữ Hoa</button></td>
          <td><button onclick="inMoiTuTrenMoiDong()">In mỗi từ trên mỗi dòng</button></td>
        </tr>
        <tr>
          <td><button onclick="inChuThuong()">In chữ thường</button></td>
          <td><button onclick="demSoTu()">Đếm số từ</button></td>
        </tr>
        <tr>
          <td><button onclick="demSoKyTuThuong()">Đếm số ký tự thường</button></td>
          <td><button onclick="inNguyenAmPhuAm()">In Nguyên âm, phụ âm</button></td>
        </tr>
        <tr>
          <td colspan="2"><button onclick="xemW3C()">Xem Website xử lý chuỗi w3c</button></td>
        </tr>
      </table>
 
    </td>
  </tr>
</table>
 
<script src="scripts.js"></script>
</body>
</html>
